name: self-test

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:

  self-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    concurrency:
      group: ${{ github.workflow }}
      cancel-in-progress: false

    permissions:
      contents: read
      pull-requests: read

    steps:

    - name: Checkout code
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        filter: 'tree:0'
        persist-credentials: false
        show-progress: false

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
      id: setup-dotnet
      with:
        dotnet-version: latest

    - name: Create global.json
      shell: pwsh
      env:
        DOTNET_VERSION: ${{ steps.setup-dotnet.outputs.dotnet-version }}
        GIT_COMMITTER_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
        GIT_COMMITTER_NAME: "github-actions[bot]"
      run: |
        $globalJsonPath = Join-Path ${env:GITHUB_WORKSPACE} "global.json"
        $globalJsonContent = @{
          sdk = @{
            version = ${env:DOTNET_VERSION}
          }
        } | ConvertTo-Json -Depth 3
        Set-Content -Path $globalJsonPath -Value $globalJsonContent
        git config user.email ${env:GIT_COMMITTER_EMAIL}
        git config user.name ${env:GIT_COMMITTER_NAME}
        git add $globalJsonPath -f
        git commit -m "Add global.json for .NET SDK version ${env:DOTNET_VERSION}" -s

    - name: Update .NET SDK
      uses: ./
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}

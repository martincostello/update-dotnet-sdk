name: release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'If true, does not create the release as a draft.'
        required: false
        type: boolean
        default: false

permissions: {}

jobs:
  release:
    runs-on: ubuntu-24.04
    if: github.event.repository.fork == false

    concurrency:
      group: ${{ github.workflow }}
      cancel-in-progress: false

    environment:
      name: release
      deployment: false

    permissions:
      contents: read
      id-token: write

    steps:

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          filter: 'tree:0'
          persist-credentials: false
          show-progress: false

      - name: Get version
        id: get-version
        shell: pwsh
        run: |
          $fileName = Join-Path "." "package.json"
          $json = (Get-Content $fileName | Out-String | ConvertFrom-Json)
          $version = $json.version
          "version=${version}" >> $env:GITHUB_OUTPUT

      - name: Get GitHub token
        id: get-github-token
        uses: martincostello/github-automation/actions/get-github-token@36f156b090e9259937ebf5151c165ddb1fcf6eac # get-github-token/v4.3.0
        with:
          profile-name: release

      - name: Create release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          DRAFT: ${{ inputs.publish != true }}
          VERSION: ${{ steps.get-version.outputs.version }}
        with:
          github-token: ${{ steps.get-github-token.outputs.token }}
          script: |
            const { repo, owner } = context.repo;
            const draft = process.env.DRAFT === 'true';
            const version = process.env.VERSION;
            const tag_name = `v${version}`;
            const target_commitish = process.env.DEFAULT_BRANCH;
            const name = tag_name;

            const { data: release } = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name,
              target_commitish,
              name,
              draft,
              generate_release_notes: true,
            });

            core.notice(`Created release ${release.name}: ${release.html_url}`);

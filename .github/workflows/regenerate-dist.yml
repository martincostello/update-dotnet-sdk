name: regenerate-dist

on:
  workflow_dispatch:
    inputs:
      npm-audit-fix:
        description: 'Whether to run npm audit fix'
        type: boolean
        required: false
        default: false

permissions: {}

jobs:
  regenerate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: github.event.repository.fork == false

    concurrency:
      group: ${{ github.workflow }}
      cancel-in-progress: false

    environment:
      name: write
      deployment: false

    permissions:
      contents: read
      id-token: write

    steps:

      - name: Checkout code
        id: checkout-code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          filter: 'tree:0'
          persist-credentials: false
          show-progress: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.x'

      - name: Install packages
        run: npm ci

      - name: Apply audit fixes
        if: inputs.npm-audit-fix
        continue-on-error: true
        run: npm audit fix

      - name: Regenerate dist
        run: npm run generate

      - name: Check for changes
        id: check-for-changes
        shell: pwsh
        run: |
          $GitStatus = (git status --porcelain)
          if ([string]::IsNullOrEmpty($GitStatus)) {
            Write-Output "No changes to commit."
            "has-changes=false" >> ${env:GITHUB_OUTPUT}
          } else {
            "has-changes=true" >> ${env:GITHUB_OUTPUT}
          }

      - name: Get GitHub token
        id: get-github-token
        if: steps.check-for-changes.outputs.has-changes == 'true'
        uses: martincostello/github-automation/actions/get-github-token@567bf2ea7958064af7863e6004a545a799f57982 # get-github-token/v4.2.0
        with:
          profile-name: write

      - name: Push changes to GitHub
        id: push-changes
        if: steps.check-for-changes.outputs.has-changes == 'true'
        shell: pwsh
        env:
          APP_SLUG: ${{ steps.get-github-token.outputs.app-slug }}
          CHECKOUT_COMMIT: ${{ steps.checkout-code.outputs.commit }}
          GH_TOKEN: ${{ steps.get-github-token.outputs.token }}
          TOKEN_TYPE: ${{ steps.get-github-token.outputs.token-type }}
        run: |
          $branchName = "regenerate-dist"
          $branchProbe = gh api "repos/${env:GITHUB_REPOSITORY}/git/ref/heads/${branchName}" 2>&1

          if ($LASTEXITCODE -eq 0) {
            Write-Output "::notice::Branch ${branchName} already exists."
            "regenerated=false" >> ${env:GITHUB_OUTPUT}
            exit 0
          }

          if ((($branchProbe | Out-String) -notmatch 'HTTP 404')) {
            throw "Failed to check whether branch '${branchName}' exists."
          }

          if (${env:TOKEN_TYPE} -eq "app") {
            $gitUserName = "${env:APP_SLUG}[bot]"
            $gitUserId = gh api "users/${gitUserName}" --jq '.id'
            if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($gitUserId)) {
              throw "Failed to resolve user ID for GitHub app ${gitUserName}."
            }
            $gitUserEmail = "${gitUserId}+${gitUserName}@users.noreply.github.com"
          } else {
            $identity = gh api "user" | ConvertFrom-Json
            $gitUserName = $identity.login
            $gitUserEmail = if ([string]::IsNullOrEmpty($identity.email)) {
              "$($identity.id)+$($identity.login)@users.noreply.github.com"
            } else {
              $identity.email
            }
          }

          $baseSha = ${env:CHECKOUT_COMMIT}

          $editedFiles = @()
          git diff --name-only $baseSha | ForEach-Object {
            $editedFiles += $_
          }

          if ($LASTEXITCODE -ne 0 || $editedFiles.Count -lt 1) {
            Write-Output "No changes to commit."
            "regenerated=false" >> ${env:GITHUB_OUTPUT}
            exit 0
          }

          function Get-RemoteContent([string] $filePath, [string] $commit) {
            $currentFile = gh api "repos/${env:GITHUB_REPOSITORY}/contents/${filePath}?ref=${commit}" | ConvertFrom-Json

            if ($null -ne $currentFile.content) {
              return $currentFile.content.Replace("`r", "").Replace("`n", "")
            }

            if (-not [string]::IsNullOrWhiteSpace($currentFile.download_url)) {
              $downloadPath = Join-Path ${env:RUNNER_TEMP} ([System.IO.Path]::GetRandomFileName())

              try {
                Invoke-WebRequest -Uri $currentFile.download_url -OutFile $downloadPath | Out-Null
                return [System.Convert]::ToBase64String([System.IO.File]::ReadAllBytes($downloadPath))
              } finally {
                if (Test-Path $downloadPath) {
                  Remove-Item $downloadPath -Force
                }
              }
            }

            if (-not [string]::IsNullOrWhiteSpace($currentFile.git_url)) {
              $currentBlob = gh api $currentFile.git_url | ConvertFrom-Json

              if ($null -ne $currentBlob.content) {
                return $currentBlob.content.Replace("`r", "").Replace("`n", "")
              }
            }

            throw "Failed to get content for ${filePath} from the GitHub contents API response."
          }

          $edits = @()

          foreach ($filePath in $editedFiles) {
            $fileFullPath = Join-Path ${env:GITHUB_WORKSPACE} $filePath
            $currentContent = Get-RemoteContent $filePath $baseSha
            $localContent = [System.Convert]::ToBase64String(
              [System.IO.File]::ReadAllBytes($fileFullPath))
            
            if ($currentContent -ne $localContent) {
              $edits += @{
                path = $filePath
                contents = $localContent
              }
            }
          }

          if ($edits.Count -lt 1) {
            Write-Output "No changes to commit."
            "regenerated=false" >> ${env:GITHUB_OUTPUT}
            exit 0
          }

          @{
            ref = "refs/heads/${branchName}"
            sha = $baseSha
          } | ConvertTo-Json -Compress | gh api --method POST "repos/${env:GITHUB_REPOSITORY}/git/refs" --input -

          $query = @'
          mutation($input: CreateCommitOnBranchInput!) {
            createCommitOnBranch(input: $input) {
              commit {
                oid
              }
            }
          }
          '@

          $title = "Regenerate dist"
          $body = @(
            "Regenerate the contents of dist.",
            "",
            "Signed-off-by: ${gitUserName} <${gitUserEmail}>"
          ) -join "`n"

          $payload = @{
            query = $query
            variables = @{
              input = @{
                branch = @{
                  repositoryNameWithOwner = ${env:GITHUB_REPOSITORY}
                  branchName = $branchName
                }
                expectedHeadOid = $baseSha
                message = @{
                  headline = $title
                  body = $body
                }
                fileChanges = @{
                  additions = $edits
                }
              }
            }
          } | ConvertTo-Json -Depth 20 -Compress

          $headers = @{
            Authorization = "Bearer ${env:GH_TOKEN}"
            Accept = "application/vnd.github+json"
          }

          $result = Invoke-RestMethod `
            -Method POST `
            -Uri ${env:GITHUB_GRAPHQL_URL} `
            -Headers $headers `
            -ContentType "application/json" `
            -Body $payload

          if ($null -ne $result.errors) {
            throw ($result.errors | ConvertTo-Json -Depth 20 -Compress)
          }

          "branch-name=${branchName}" >> ${env:GITHUB_OUTPUT}
          "regenerated=true" >> ${env:GITHUB_OUTPUT}
          "title=${title}" >> ${env:GITHUB_OUTPUT}

      - name: Create pull request
        if: steps.push-changes.outputs.regenerated == 'true'
        shell: pwsh
        env:
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          HEAD_BRANCH: ${{ steps.push-changes.outputs.branch-name }}
          GH_TOKEN: ${{ steps.get-github-token.outputs.token }}
          PR_TITLE: ${{ steps.push-changes.outputs.title }}
        run: |
          $workflowUrl = "${env:GITHUB_SERVER_URL}/${env:GITHUB_REPOSITORY}/actions/runs/${env:GITHUB_RUN_ID}"

          $body = @(
            "Regenerate the contents of ``dist``.",
            "",
            "This pull request was generated by [GitHub Actions](${workflowUrl})."
          ) -join "`n"

          $prUrl = gh pr create `
            --title ${env:PR_TITLE} `
            --body $body `
            --head ${env:HEAD_BRANCH} `
            --base ${env:BASE_BRANCH} `
            --repo ${env:GITHUB_REPOSITORY}

          if ($LASTEXITCODE -ne 0) {
            throw "Failed to create pull request."
          }

          $prNumber = ($prUrl -split "/")[-1]
          Write-Output "::notice::Created pull request ${env:GITHUB_REPOSITORY}#${prNumber}: ${prUrl}"
